features:
  - id: subscription-authz
    name: Subscription-Based Authorization
    status: planned
    priority: P0
    completion: 0
    repos:
      - platform-backend-service
    description: >
      External AuthZ REST API (POST /v1/authz/check), OPA policy bundles, gateway plugins (Kong, Envoy), SDKs.
      Does not replace customer auth — adds a governance enforcement layer on top.
      The subscription model is extended to cover both API subscriptions (human teams → APIs) and
      MCP server subscriptions (agent identities → MCP servers). AuthZ check endpoints serve both surfaces:
      POST /v1/authz/check for API access, POST /v1/mcp-authz/check for MCP tool access.
    goal_ids:
      - subscription-authz
      - mcp-governance
    links:
      - label: Spec
        url: /features/subscription-authz
      - label: MCP Governance
        url: /features/mcp-governance
