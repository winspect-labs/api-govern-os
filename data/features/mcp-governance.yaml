# MCP server governance — deferred until after production launch / first milestone
# ==================================================================================
# Focus: APIs first. Revisit catalog, linting, and agent subscription model once core platform
# is live and MCP governance requirements are clearer.

features:
  - id: mcp-server-catalog
    name: MCP Server Catalog & Registry
    status: planned
    priority: P3
    completion: 0
    repos:
      - api-management-ui
      - platform-backend-service
    description: >
      [Deferred — see goal mcp-governance.] A first-class registry for MCP servers alongside the API catalog.
      Teams register MCP servers with metadata (name, description, transport URL, tool manifest), assign team ownership,
      and manage lifecycle (active, deprecated, experimental). Discovery surfaces MCP servers
      to agents and developers in the same unified inventory as REST APIs.
    goal_ids:
      - mcp-governance
      - agentic-integration
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: mcp-server-linting
    name: MCP Server Linting & Quality Control
    status: planned
    priority: P3
    completion: 0
    repos:
      - platform-backend-service
    description: >
      [Deferred — see goal mcp-governance.] Static analysis and quality scoring for registered MCP servers.
      Validates tool descriptions, input schema completeness, naming conventions, and security properties.
      Produces a quality score (0–100) and surfaced lint warnings/errors in the catalog UI.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: mcp-subscription-authz
    name: MCP Subscription & Agent Authorization
    status: planned
    priority: P3
    completion: 0
    repos:
      - platform-backend-service
      - api-management-ui
    description: >
      [Deferred — see goal mcp-governance.] Extend the subscription model so agents can subscribe to MCP servers;
      AgentIdentity entity; POST /v1/mcp-authz/check for tool invocation. Mirrors API subscription model on a new surface.
    goal_ids:
      - mcp-governance
      - subscription-authz
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: mcp-rate-limits
    name: MCP Server Rate Limits & Usage Quotas
    status: planned
    priority: P3
    completion: 0
    repos:
      - platform-backend-service
    description: >
      [Deferred — see goal mcp-governance.] Per-agent, per-subscription rate limiting for MCP tool invocations.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: mcp-k8s-discovery
    name: K8s MCP Server Discovery
    status: planned
    priority: P3
    completion: 0
    repos:
      - winspect-api-discovery-agent
      - platform-backend-service
    description: >
      [Deferred — see goal mcp-governance.] Extend the K8s discovery agent to detect deployed MCP servers in clusters.
    goal_ids:
      - mcp-governance
      - automated-discovery
    links:
      - label: Spec
        url: /features/mcp-governance
