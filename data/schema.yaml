# Product OS - Unified schema for spec structure
# ==============================================
# FORK: Update domains below to match your product. Each domain has many features.
# AGENTS: Read this file first to find feature file paths. Domain file paths are relative to repo root.
#
# Structure:
#   - entities: field definitions for goals, features, backlog_items, etc.
#   - domains: list of { id, file, description } — each domain maps to a YAML file under data/features/

version: "1"

entities:
  goals:
    required: [id, title, status]
    fields:
      id: { type: string, pattern: "^[a-z0-9-]+$" }
      title: string
      status: { enum: [active, accomplished] }
      description: string
      target_date: string
      links:
        type: array
        items:
          required: [label, url]
          properties:
            label: string
            url: string

  features:
    required: [id, name, status, priority]
    fields:
      id: { type: string, pattern: "^[a-z0-9-]+$" }
      name: string
      status: { enum: [planned, in-progress, shipped, deprecated] }
      priority: { enum: [P0, P1, P2, P3] }
      completion: { type: number, min: 0, max: 100 }
      repos: { type: array, items: string }
      description: string
      goal_ids: { type: array, items: string }
      links:
        type: array
        items:
          required: [label, url]
          properties:
            label: string
            url: string

  backlog_items:
    required: [id, title, status, priority]
    fields:
      id: string
      title: string
      status: string
      priority: { enum: [P0, P1, P2, P3] }
      ice:
        type: object
        properties:
          impact: { type: number, min: 1, max: 10 }
          confidence: { type: number, min: 1, max: 10 }
          ease: { type: number, min: 1, max: 10 }
      description: string
      goal_ids: { type: array, items: string }
      links:
        type: array
        items:
          required: [label, url]
          properties:
            label: string
            url: string

  okrs:
    required: [id, objective]
    fields:
      id: string
      objective: string
      key_results: { type: array, items: string }
      status: { enum: [draft, active, achieved] }
      target_date: string

  research_sources:
    required: [id, title, url]
    fields:
      id: string
      title: string
      url: string
      date: string
      type: string
      credibility: { enum: [high, medium, low] }
      notes: string

  repositories:
    required: [id, name, purpose, status]
    fields:
      id: string
      name: string
      purpose: string
      tech: { type: array, items: string }
      status: string
      url: string

  roadmap_quarters:
    required: [id, label, status]
    fields:
      id: string
      label: string
      themes: { type: array, items: string }
      status: string

# AGENTS: Iterate domains, load each file, merge features. Use goal_ids to map features to goals.
domains:
  - id: api-catalog
    file: data/features/api-catalog.yaml
    description: API catalog, subscriptions, ABAC, mock server
  - id: discovery
    file: data/features/discovery.yaml
    description: K8s runtime discovery, spec records, bulk import, manual mapping
  - id: ai-search
    file: data/features/ai-search.yaml
    description: RAG semantic search for API discovery
  - id: subscription-authz
    file: data/features/subscription-authz.yaml
    description: Subscription-based authorization enforcement (AuthZ API, OPA, gateway plugins)
  - id: production-launch
    file: data/features/production-launch.yaml
    description: Production readiness — UI polish, settings, domain, multi-org isolation, authorization
  - id: api-change-notifications
    file: data/features/api-change-notifications.yaml
    description: Notify API subscribers on spec changes via UI, email, and Slack; changelog and release notes on updates
  - id: mcp-server
    file: data/features/mcp-server.yaml
    description: Remote MCP server, Claude connector, and hosted per-org MCP endpoint for AI tools
  - id: developer-cli
    file: data/features/developer-cli.yaml
    description: winspect-cli — TypeScript CLI for publishing APIs, listing subscribers, searching, and managing subscriptions from the terminal or CI/CD
  - id: mcp-governance
    file: data/features/mcp-governance.yaml
    description: MCP server catalog, team ownership, linting/quality control, agent subscription authz, rate limits, and K8s MCP discovery — governance layer for MCP server sprawl
  - id: developer-tooling
    file: data/features/developer-tooling.yaml
    description: Public winspect CLI (registry-focused), GitHub Action, CI integration, and developer onboarding
  - id: api-registry
    file: data/features/api-registry.yaml
    description: Spec versioning, registry read API, breaking change detection, public index
  - id: free-tier
    file: data/features/free-tier.yaml
    description: Organisation plans (FREE/PRO), limits, mock rate limiting, Spectral persistence
