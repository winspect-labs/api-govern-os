# Repository map - all repos with purpose and tech stack
# =======================================================
# AGENTS: When adding a new repo, add it here and link from relevant features.

repositories:
  - id: api-management-ui
    name: api-management-ui
    purpose: Customer-facing API management UI (catalog, subscriptions, discovery, RAG search)
    tech:
      - Next.js 14
      - TypeScript
      - Material UI
      - Clerk
    status: active
    url: https://github.com/winspect-labs/api-management-ui

  - id: platform-backend-service
    name: platform-backend-service
    purpose: Core backend (API management, subscriptions, ABAC, discovery, RAG proxy) + platform-ai (RAG, embeddings)
    tech:
      - Spring Boot 3.4.1 / 3.5.7
      - Java 17 / 21
      - PostgreSQL
      - pgvector
    status: active
    url: https://github.com/winspect-labs/platform-backend-service

  - id: winspect-api-discovery-agent
    name: winspect-api-discovery-agent
    purpose: Lightweight K8s discovery agent deployed in customer clusters; registers runtime records
    tech:
      - Spring Boot 3.4.1
      - Java 17
      - Helm
    status: active
    url: https://github.com/winspect-labs/winspect-api-discovery-agent

  - id: api-govern-os
    name: api-govern-os
    purpose: Product knowledge base (vision, features, backlog, decisions) — source of truth for agents and humans
    tech:
      - Next.js
      - Nextra
      - MDX
    status: active
    url: https://github.com/nakulshukla08/api-govern-os
