# Repository map - all repos with purpose and tech stack
# =======================================================
# FORK: Replace with your repositories. Update ids, names, urls. Reference these ids
#       in data/features/*.yaml under the repos field.
# AGENTS: When adding a new repo, add it here and link from relevant features.

repositories:
  - id: petstore-frontend
    name: petstore-frontend
    purpose: Customer-facing store UI (catalog, cart, checkout)
    tech:
      - Next.js
      - React
      - TypeScript
    status: active
    url: https://github.com/example/petstore-frontend

  - id: petstore-api
    name: petstore-api
    purpose: REST API for pets, cart, orders
    tech:
      - Node.js
      - Express
      - PostgreSQL
    status: active
    url: https://github.com/example/petstore-api

  - id: petstore-admin
    name: petstore-admin
    purpose: Admin dashboard for inventory and orders
    tech:
      - React
      - Node.js
    status: active
    url: https://github.com/example/petstore-admin
