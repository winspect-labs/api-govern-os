# Product goals - OKRs or strategic objectives
# ===========================================
# AGENTS: When a goal is achieved, set status: accomplished. Reference goal_ids in
#        data/features/*.yaml and data/backlog.yaml to keep work aligned with goals.

goals:
  - id: core-platform
    title: Core API Management Platform
    description: Ship API catalog, subscriptions, ABAC, and mock server for first customers
    status: accomplished
    target_date: Q4 2025

  - id: automated-discovery
    title: K8s API Auto-Discovery
    description: Eliminate manual API registration by discovering APIs from Kubernetes services
    status: active
    target_date: Q1 2026

  - id: subscription-authz
    title: Subscription-Based Authorization
    description: Enable runtime authorization enforcement without replacing customer auth
    status: active
    target_date: Q2 2026

  - id: ai-discoverability
    title: AI-Powered API Discoverability
    description: Semantic search via RAG for natural language API discovery
    status: active
    target_date: Q1 2026

  - id: production-launch
    title: Production Launch
    description: Ship Winspect to production — polished UI, working settings, production domain, multi-org data isolation tested, and authorization enforced
    status: active
    target_date: Q2 2026

  - id: enterprise-readiness
    title: Enterprise Readiness
    description: Multi-tenant hardening, audit trails, SLA guarantees
    status: active
    target_date: Q4 2026
