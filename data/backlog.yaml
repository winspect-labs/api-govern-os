  # ── MCP Governance ───────────────────────────────────────────────────────────

  - id: bl-033
    title: Extend subscription entity to support MCP server subscriptions
    status: proposed
    priority: P0
    ice:
      impact: 9
      confidence: 8
      ease: 6
    description: >
      Extend the Subscription entity and data model so that the subscriber_type field
      accepts both TEAM (existing, for human teams subscribing to APIs) and AGENT (new, for
      agent identities subscribing to MCP servers). Add resource_type field to distinguish
      API subscriptions from MCP_SERVER subscriptions. Add AgentIdentity entity
      (client_id, hashed_secret, name, description, owning_team_id). Requires Flyway migration,
      updated OpenAPI spec, and frontend type regeneration. This is the schema foundation
      all other MCP governance features depend on.
    goal_ids:
      - mcp-governance
      - subscription-authz
    feature_id: mcp-subscription-authz
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-034
    title: MCP server registration UI (catalog list, register, detail view)
    status: proposed
    priority: P0
    ice:
      impact: 9
      confidence: 8
      ease: 6
    description: >
      Add MCP Servers section to the catalog UI alongside APIs. Screens: MCP server list
      (name, team owner, tool count, quality score, status), register MCP server dialog
      (name, description, transport URL, tool manifest JSON upload or URL fetch),
      MCP server detail page (tools list, subscribers, quality report, owner team).
      Backend endpoints: GET /mcp-management/servers, POST /mcp-management/servers,
      GET /mcp-management/servers/{id}. Mirrors the API catalog UI patterns.
    goal_ids:
      - mcp-governance
    feature_id: mcp-server-catalog
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-035
    title: MCP server team ownership model (assign owner team, ABAC roles)
    status: proposed
    priority: P1
    ice:
      impact: 8
      confidence: 8
      ease: 7
    description: >
      Each MCP server must have an owning team (similar to API → team ownership).
      Owner team gets MANAGE-level ABAC permission; other teams can subscribe for CALL permission.
      Extend ABAC policy evaluation to cover mcp_server resources. Org admin can reassign
      ownership. Orphaned MCP servers (no owner team) are flagged with a warning in the catalog.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    feature_id: mcp-server-catalog
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-036
    title: MCP server linting engine (tool description quality, schema validation, naming)
    status: proposed
    priority: P1
    ice:
      impact: 8
      confidence: 7
      ease: 5
    description: >
      Build a static linting engine that runs on MCP server tool manifests at registration time
      and on-demand. Rules: tool name must be snake_case and verb-prefixed (e.g. get_order, list_users);
      tool description must be ≥20 characters and not start with "A tool that...";
      all inputSchema properties must have a description; no required fields without type annotation;
      tool description must not contain tokens that look like secrets (regex for hex-40, base64-40+).
      Produces a structured lint report (rule_id, severity: error/warning/info, message, tool_name).
      Critical errors block registration. Warnings surface in UI.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    feature_id: mcp-server-linting
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-037
    title: MCP server quality score and dashboard
    status: proposed
    priority: P2
    ice:
      impact: 7
      confidence: 7
      ease: 6
    description: >
      Compute a composite quality score (0–100) for each registered MCP server based on
      lint rule pass rates, tool description length/clarity, inputSchema completeness,
      number of warnings vs errors. Display score badge on catalog list and detail page.
      Org-level dashboard shows quality distribution across all MCP servers — which servers
      are below threshold, which teams own them, trend over time as servers are updated.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    feature_id: mcp-server-linting
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-038
    title: Agent identity registration and MCP server subscription workflow
    status: proposed
    priority: P1
    ice:
      impact: 9
      confidence: 7
      ease: 5
    description: >
      UI and API for: (1) registering an agent identity (name, description, owning team, client_id
      generated, secret displayed once); (2) subscribing an agent identity to an MCP server
      (selects server, requests scope: read_tools or call_tools); (3) approval workflow — MCP server
      owner team approves/rejects with optional scope restriction; (4) approved agent receives
      a scoped token valid for calling that MCP server's tools. Mirrors the API subscription
      approval workflow. Backend: POST /mcp-management/agent-identities,
      POST /mcp-management/servers/{id}/subscriptions.
    goal_ids:
      - mcp-governance
      - subscription-authz
    feature_id: mcp-subscription-authz
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-039
    title: External AuthZ API for MCP tool access (POST /v1/mcp-authz/check)
    status: proposed
    priority: P1
    ice:
      impact: 9
      confidence: 8
      ease: 6
    description: >
      REST endpoint for MCP servers to enforce authorization at tool invocation time.
      Request: { agent_client_id, mcp_server_id, tool_name, required_scope }.
      Response: { allowed: boolean, reason: string, subscription_id }.
      The MCP server calls this before executing any tool. Enables fine-grained tool-level
      access control beyond server-level subscription. Mirrors POST /v1/authz/check for APIs.
      Stateless and low-latency (<10ms p99 on warm cache). OPA-backed policy evaluation.
    goal_ids:
      - mcp-governance
      - subscription-authz
    feature_id: mcp-subscription-authz
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-040
    title: Per-agent rate limiting for MCP tool invocations
    status: proposed
    priority: P2
    ice:
      impact: 7
      confidence: 7
      ease: 5
    description: >
      Configurable rate limits per MCP server subscription. Platform team sets limits at the
      MCP server level (e.g. 1000 tool calls/hour globally) and per-subscription (e.g. 100/hour
      per agent). Rate limit enforcement runs at the MCP authz check layer — if limit exceeded,
      /v1/mcp-authz/check returns allowed: false with reason RATE_LIMIT_EXCEEDED.
      Quota windows: per-minute, per-hour, per-day. Integrates with usage analytics.
      Critical for preventing runaway agent loops from overloading downstream services.
    goal_ids:
      - mcp-governance
      - enterprise-readiness
    feature_id: mcp-rate-limits
    links:
      - label: Spec
        url: /features/mcp-governance

  - id: bl-041
    title: K8s MCP server auto-discovery (extend discovery agent)
    status: proposed
    priority: P2
    ice:
      impact: 7
      confidence: 6
      ease: 5
    description: >
      Extend the winspect-api-discovery-agent to detect MCP servers deployed in customer K8s clusters.
      Detection heuristics: (1) pod/service label app.winspect.io/type=mcp-server;
      (2) service annotation winspect.io/mcp-transport-url pointing to Streamable HTTP endpoint;
      (3) ConfigMap with key winspect-mcp-manifest containing tool manifest JSON.
      Discovered MCP servers appear as orphaned runtime records in the MCP catalog, following
      the same bulk-import and manual-mapping workflow used for REST API discovery.
    goal_ids:
      - mcp-governance
      - automated-discovery
    feature_id: mcp-k8s-discovery
    links:
      - label: Spec
        url: /features/mcp-governance

